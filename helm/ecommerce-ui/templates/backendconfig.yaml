apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ include "ecommerce-ui.fullname" . }}-backendconfig
  labels:
    {{- include "ecommerce-ui.labels" . | nindent 4 }}
spec:
  healthCheck:
    checkIntervalSec: 15
    port: {{ .Values.service.port }}
    type: HTTP
    requestPath: /
