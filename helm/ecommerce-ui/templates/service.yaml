apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecommerce-ui.fullname" . }}
  labels:
    {{- include "ecommerce-ui.labels" . | nindent 4 }}
  annotations:
    cloud.google.com/backend-config: '{"default": "{{ include "ecommerce-ui.fullname" . }}-backendconfig"}'
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ecommerce-ui.selectorLabels" . | nindent 4 }}
